name: Build FSK441+

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fsk441-macos-arm64
            bundle: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fsk441-macos-x64
            bundle: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fsk441-linux-x64
            bundle: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fsk441-windows-x64
            bundle: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libglib2.0-dev \
            libudev-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --bin fsk441 --release --target ${{ matrix.target }}

      # ── macOS: bundle, sign and notarize ─────────────────────────────────
      - name: Import signing certificate
        if: matrix.bundle && github.event_name == 'release'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Create .app bundle (macOS)
        if: matrix.bundle
        run: |
          APP="FSK441Plus.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp target/${{ matrix.target }}/release/fsk441 "$APP/Contents/MacOS/fsk441"
          # Copy icon if present
          if [ -f assets/FSK441PLUS.png ]; then
            # Convert PNG to ICNS for proper macOS icon
            mkdir -p icon.iconset
            sips -z 16 16     assets/FSK441PLUS.png --out icon.iconset/icon_16x16.png
            sips -z 32 32     assets/FSK441PLUS.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32     assets/FSK441PLUS.png --out icon.iconset/icon_32x32.png
            sips -z 64 64     assets/FSK441PLUS.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128   assets/FSK441PLUS.png --out icon.iconset/icon_128x128.png
            sips -z 256 256   assets/FSK441PLUS.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256   assets/FSK441PLUS.png --out icon.iconset/icon_256x256.png
            sips -z 512 512   assets/FSK441PLUS.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512   assets/FSK441PLUS.png --out icon.iconset/icon_512x512.png
            cp assets/FSK441PLUS.png                    icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o "$APP/Contents/Resources/AppIcon.icns"
          fi
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>FSK441Plus</string>
            <key>CFBundleDisplayName</key><string>FSK441+</string>
            <key>CFBundleIdentifier</key><string>com.thedxshop.fsk441plus</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundleExecutable</key><string>fsk441</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSMicrophoneUsageDescription</key>
              <string>FSK441+ needs microphone access to receive meteor scatter signals.</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST

      - name: Sign .app bundle (macOS release only)
        if: matrix.bundle && github.event_name == 'release'
        env:
          MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
        run: |
          codesign --force --deep --sign "$MACOS_IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist \
            FSK441Plus.app

      - name: Notarize (macOS release only)
        if: matrix.bundle && github.event_name == 'release'
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent FSK441Plus.app FSK441Plus.zip
          xcrun notarytool submit FSK441Plus.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple FSK441Plus.app

      - name: Package macOS DMG
        if: matrix.bundle
        run: |
          if [ -d FSK441Plus.app ]; then
            hdiutil create -volname "FSK441Plus" \
              -srcfolder FSK441Plus.app \
              -ov -format UDZO \
              ${{ matrix.artifact }}.dmg
          fi

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/fsk441 ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\fsk441.exe ${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.exe
          if-no-files-found: ignore

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.exe
